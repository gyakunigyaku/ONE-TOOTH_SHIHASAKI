<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE TOOTH</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; background-color: #000; overflow: hidden; }
        #gameArea { position: relative; width: 100vw; max-width: 500px; height: 100vh; background: url('bg.jpg') no-repeat center center; background-size: cover; overflow: hidden; }
        
        /* م‚¹م‚؟مƒ¼مƒˆç”»é‌¢مپ®è£…é£¾ */
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        #titleLogo { width: 90%; max-width: 400px; margin-bottom: 40px; }
        #startBtn { width: 140px; cursor: pointer; transition: transform 0.1s; }
        #startBtn:active { transform: scale(0.95); }

        /* م‚²مƒ¼مƒ ç”¨è¦پç´ ï¼ˆهˆ‌وœںمپ¯é‌‍è،¨ç¤؛ï¼‰ */
        #tooth { position: absolute; width: 40px; left: 55%; top: -50px; z-index: 10; display: none; }
        #stopBtn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; cursor: pointer; z-index: 20; display: none; }
        
        #resultBoard { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.95); padding: 30px; text-align: center; border-radius: 15px; display: none; width: 80%; z-index: 30; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .score-text { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .retry-btn { padding: 10px 20px; font-size: 18px; font-weight: bold; background-color: #ff4a4a; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="startScreen">
            <img id="titleLogo" src="TITLE_LOGO.jpg" alt="ONE TOOTH">
            <img id="startBtn" src="START.png" alt="START">
        </div>

        <img id="tooth" src="tooth.png" alt="و­¯">
        <img id="stopBtn" src="stop.png" alt="STOP">
        
        <div id="resultBoard">
            <div id="resultText" class="score-text"></div>
            <button class="retry-btn" onclick="location.reload()">م‚‚مپ†ن¸€ه؛¦مƒ—مƒ¬م‚¤</button>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const tooth = document.getElementById('tooth');
        const stopBtn = document.getElementById('stopBtn');
        const resultBoard = document.getElementById('resultBoard');
        const resultText = document.getElementById('resultText');
        const gameArea = document.getElementById('gameArea');

        let pos = -50;
        let gameInterval;
        let isPlaying = false;
        
        // و­¯مپŒو­£è§£مپ¨مپھم‚‹هڈ£ه…ƒمپ®ن½چç½®
        const targetY = gameArea.clientHeight * 0.75; 

        // éں³ه£°مƒ•م‚،م‚¤مƒ«مپ®èھ­مپ؟è¾¼مپ؟ï¼ˆمƒ«مƒ¼مƒ—è¨­ه®ڑç­‰ï¼‰
        const bgm = new Audio('م‚¤مƒƒمƒ‌مƒ³مپ®مƒڈم‚،م‚،م‚،.mp3');
        bgm.loop = true;
        const stopSe = new Audio('م‚¤مƒƒمƒ‌مƒ³مپ®مƒڈم‚،م‚،م‚،STOP.mp3');

        // م‚¹م‚؟مƒ¼مƒˆمƒœم‚؟مƒ³ه‡¦çگ†
        startBtn.addEventListener('click', () => {
            // ç”»é‌¢هˆ‡م‚ٹو›؟مپˆ
            startScreen.style.display = 'none';
            tooth.style.display = 'block';
            stopBtn.style.display = 'block';
            
            // BGMمپ®ه†چç”ںï¼ˆمƒ–مƒ©م‚¦م‚¶مپ®ن»•و§کن¸ٹم€پمƒ¦مƒ¼م‚¶مƒ¼مپ®م‚¯مƒھمƒƒم‚¯مپ¨هگŒو™‚مپ«ه†چç”ںمپŒه؟…è¦پï¼‰
            bgm.currentTime = 0;
            bgm.play().catch(e => console.log("BGMه†چç”ںم‚¨مƒ©مƒ¼:", e));
            
            isPlaying = true;
            gameInterval = setInterval(drop, 20);
        });

        // èگ½ن¸‹ه‡¦çگ†
        function drop() {
            if (!isPlaying) return;
            pos += 8;
            tooth.style.top = pos + 'px';

            if (pos > gameArea.clientHeight - 50) {
                isPlaying = false;
                clearInterval(gameInterval);
                bgm.pause(); // BGMهپœو­¢
                resultText.innerHTML = "م‚²مƒ¼مƒ م‚ھمƒ¼مƒگمƒ¼<br><span style='font-size:16px; color:#666;'>ن¸‹مپ«èگ½مپ،مپ،م‚ƒمپ£مپںï¼پ</span>";
                resultBoard.style.display = "block";
            }
        }

        // STOPمƒœم‚؟مƒ³ه‡¦çگ†
        stopBtn.addEventListener('click', () => {
            if (!isPlaying) return;
            isPlaying = false;
            clearInterval(gameInterval);

            // éں³ه£°مپ®هˆ‡م‚ٹو›؟مپˆ
            bgm.pause();
            stopSe.currentTime = 0;
            stopSe.play().catch(e => console.log("SEه†چç”ںم‚¨مƒ©مƒ¼:", e));

            // ç‚¹و•°è¨ˆç®—
            let diff = Math.abs(targetY - pos);
            let score = Math.max(0, 100 - Math.floor(diff / 4));

            // çµگو‍œè،¨ç¤؛
            if (score === 100) {
                resultText.innerHTML = "ه¥‡è·،مپ®م‚¸مƒ£م‚¹مƒˆمƒ•م‚£مƒƒمƒˆï¼پ<br><span style='font-size:36px; color:#ff0000;'>100%</span>";
            } else {
                resultText.innerHTML = "مƒ•م‚£مƒƒمƒˆçژ‡<br><span style='font-size:36px; color:#ff0000;'>" + score + "%</span><br><span style='font-size:16px; color:#666;'>100ç‚¹ن¸­</span>";
            }
            resultBoard.style.display = "block";
        });
    </script>
</body>
</html>
