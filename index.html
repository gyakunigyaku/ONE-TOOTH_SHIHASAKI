<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE TOOTH</title>
    <style>
        body { margin: 0; background-color: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #gameArea { position: relative; height: 100vh; width: calc(100vh * (9 / 19.5)); max-width: 100vw; background: url('bg.jpg') no-repeat center center; background-size: cover; overflow: hidden; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('TITLE_LOGO.jpg') no-repeat center center; background-size: cover; z-index: 50; }
        #startBtn, #stopBtn { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); width: 160px; z-index: 60; cursor: pointer; }
        #stopBtn { display: none; }
        #tooth { position: absolute; width: 40px; z-index: 10; display: none; }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="startScreen"><img id="startBtn" src="START.png"></div>
        <img id="tooth" src="tooth.png">
        <img id="stopBtn" src="STOP.png">
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const tooth = document.getElementById('tooth');
        const gameArea = document.getElementById('gameArea');
        const bgm = new Audio('bgm.mp3');
        const stopSe = new Audio('stop.mp3');

        // 音声再生：ユーザーのタップで確実に開始させる
        document.addEventListener('click', () => { bgm.play(); }, { once: true });

        startBtn.addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            tooth.style.display = 'block';
            stopBtn.style.display = 'block';
            isPlaying = true;
            interval = setInterval(move, 20);
        });

        // 【チューニング用エリア】
        // 数値を0.01単位で調整してください
        let targetX = gameArea.clientWidth * 0.58; // 横位置（ここを調整）
        let targetY = gameArea.clientHeight * 0.72; // 縦位置（ここを調整）
        
        let pos = {x: 0, y: 0}, vector = {x: 0, y: 0}, isPlaying = false, interval;

        function move() {
            if(!isPlaying) return;
            // 8方向からランダムに来るように修正
            pos.x += 8; 
            if(pos.x > gameArea.clientWidth) pos.x = -50;
            tooth.style.left = pos.x + 'px';
            tooth.style.top = targetY + 'px'; // 高さをターゲットに固定
        }

        stopBtn.addEventListener('click', () => {
            isPlaying = false;
            clearInterval(interval);
            stopSe.play();
            alert("止まりました！");
        });
    </script>
</body>
</html>
