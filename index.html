<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE TOOTH</title>
    <style>
        body { margin: 0; background-color: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; }
        
        /* 9:19.5 比率を強制固定するコンテナ */
        #gameArea { 
            position: relative; 
            height: 100vh; 
            width: calc(100vh * (9 / 19.5)); 
            max-width: 100vw;
            background: url('bg.jpg') no-repeat center center; 
            background-size: cover; 
            overflow: hidden; 
        }
        
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('TITLE_LOGO.jpg') no-repeat center center; background-size: cover; z-index: 50; }
        
        /* ボタン配置：顎下（下から8%）に配置 */
        #startBtn, #stopBtn { 
            position: absolute; 
            bottom: 8%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 180px; 
            cursor: pointer; 
            z-index: 60;
        }
        #stopBtn { z-index: 20; display: none; }
        
        /* スコア表示：最上部（札の上） */
        #resultBoard { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; display: none; z-index: 30; }
        .score-text { font-size: 30px; font-weight: 900; color: #ff0000; text-shadow: 1px 1px 0 #fff; }
        
        /* リプレイボタン：左下角より少し上 */
        #retryBtn { position: absolute; bottom: 18%; left: 5%; padding: 8px 12px; font-size: 14px; background: #ff4a4a; color: white; border: none; border-radius: 5px; display: none; z-index: 80; }
        
        #tooth { position: absolute; width: 40px; z-index: 10; display: none; }
        .top-char { position: absolute; width: 70px; z-index: 55; pointer-events: none; }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="startScreen">
            <img id="char1" class="top-char" src="top_t_01.png">
            <img id="char2" class="top-char" src="top_t_02.png">
            <img id="char3" class="top-char" src="top_t_03.png">
            <img id="startBtn" src="START.png">
        </div>
        <img id="tooth" src="tooth.png">
        <img id="stopBtn" src="STOP.png">
        <div id="resultBoard"><div id="resultText" class="score-text"></div></div>
        <button id="retryBtn" onclick="location.reload()">リプレイ</button>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const tooth = document.getElementById('tooth');
        const resultBoard = document.getElementById('resultBoard');
        
        let targetX, targetY, pos = {x:0, y:0}, vector = {x:0, y:0}, isPlaying = false, interval;

        startBtn.addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            tooth.style.display = 'block';
            stopBtn.style.display = 'block';
            
            // 【確定】画像内の歯の場所（9:19.5の比率に基づいた絶対位置）
            targetX = gameArea.clientWidth * 0.58;
            targetY = gameArea.clientHeight * 0.69;
            
            // 動きの初期化
            pos.x = -100; pos.y = targetY;
            let dx = targetX - pos.x, dy = targetY - pos.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            vector.x = (dx/dist) * 10; vector.y = (dy/dist) * 10;
            
            isPlaying = true;
            interval = setInterval(move, 20);
        });

        function move() {
            if(!isPlaying) return;
            pos.x += vector.x; pos.y += vector.y;
            tooth.style.left = pos.x + 'px';
            tooth.style.top = pos.y + 'px';
        }

        stopBtn.addEventListener('click', () => {
            isPlaying = false;
            clearInterval(interval);
            let dx = targetX - pos.x, dy = targetY - pos.y;
            let score = Math.max(0, 100 - Math.sqrt(dx*dx + dy*dy));
            document.getElementById('resultText').innerText = score.toFixed(1) + "%";
            resultBoard.style.display = 'block';
            document.getElementById('retryBtn').style.display = 'block';
        });
    </script>
</body>
</html>
