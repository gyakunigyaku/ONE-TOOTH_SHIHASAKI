<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE TOOTH</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #gameArea { position: relative; width: 100vw; max-width: 500px; height: 100vh; background: url('bg.jpg') no-repeat center center; background-size: cover; overflow: hidden; }
        
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('TITLE_LOGO.jpg') no-repeat center center; background-size: cover; z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20%; box-sizing: border-box; overflow: hidden; }
        #startBtn { width: 160px; cursor: pointer; transition: transform 0.1s; z-index: 60; }
        #startBtn:active { transform: scale(0.95); }
        
        .top-char { position: absolute; width: 70px; z-index: 55; }

        #audioOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; z-index: 70; }
        #audioOverlay p { font-size: 14px; margin-top: 10px; color: #ccc; font-weight: normal; }

        #tooth { position: absolute; width: 40px; z-index: 10; display: none; margin-left: -20px; margin-top: -20px; }
        #stopBtn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; cursor: pointer; z-index: 20; display: none; }
        
        #resultBoard { position: absolute; top: 22%; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.7); padding: 25px 15px; text-align: center; border-radius: 15px; display: none; width: 80%; z-index: 30; box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(3px); }
        .result-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .score-text { font-size: 52px; font-weight: 900; color: #ff0000; margin-bottom: 20px; text-shadow: 2px 2px 0px #fff; }
        
        .gold-text-wrapper { filter: drop-shadow(0px 5px 8px rgba(0,0,0,0.7)); margin-bottom: 20px; }
        .gold-text {
            background: linear-gradient(to bottom, #FFFFE0 0%, #FFD700 40%, #B8860B 60%, #FFFFE0 100%);
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-stroke: 2px #FFFFFF;
            font-size: 68px;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .gameover-text {
            font-size: 50px;
            font-weight: 900;
            background: url('tooth.png') repeat;
            background-size: 40px;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-stroke: 1.5px #333;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .retry-btn { padding: 12px 24px; font-size: 18px; font-weight: bold; background-color: #ff4a4a; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #cc0000; transition: transform 0.1s, box-shadow 0.1s; }
        .retry-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="audioOverlay">
            <div>画面をタップして開始</div>
            <p>※BGMを再生するために必要です</p>
        </div>
        
        <div id="startScreen">
            <img id="char1" class="top-char" src="top_t_01.png" alt="">
            <img id="char2" class="top-char" src="top_t_02.png" alt="">
            <img id="char3" class="top-char" src="top_t_03.png" alt="">
            
            <img id="startBtn" src="START.png" alt="START">
        </div>

        <img id="tooth" src="tooth.png" alt="歯">
        <img id="stopBtn" src="stop.png" alt="STOP">
        
        <div id="resultBoard">
            <div id="resultText"></div>
            <button class="retry-btn" onclick="location.reload()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const audioOverlay = document.getElementById('audioOverlay');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn
