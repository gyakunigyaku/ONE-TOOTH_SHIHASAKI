<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE TOOTH</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #gameArea { position: relative; width: 100vw; max-width: 500px; height: 100vh; background: url('bg.jpg') no-repeat center center; background-size: cover; overflow: hidden; }
        
        /* トップ画面：TITLE_LOGOを全画面背景にして、STARTボタンを下部に配置 */
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('TITLE_LOGO.jpg') no-repeat center center; background-size: cover; z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20%; box-sizing: border-box; }
        #startBtn { width: 160px; cursor: pointer; transition: transform 0.1s; }
        #startBtn:active { transform: scale(0.95); }
        
        /* BGM自動再生ブロック時の対応画面 */
        #audioOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; z-index: 60; }
        #audioOverlay p { font-size: 14px; margin-top: 10px; color: #ccc; font-weight: normal; }

        /* 歯とSTOPボタン */
        #tooth { position: absolute; width: 40px; z-index: 10; display: none; margin-left: -20px; margin-top: -20px; }
        #stopBtn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; cursor: pointer; z-index: 20; display: none; }
        
        /* 結果表示（メガネの上付近、背景を薄く透過） */
        #resultBoard { position: absolute; top: 22%; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.7); padding: 25px 15px; text-align: center; border-radius: 15px; display: none; width: 80%; z-index: 30; box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(3px); }
        .result-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .score-text { font-size: 52px; font-weight: 900; color: #ff0000; margin-bottom: 20px; text-shadow: 2px 2px 0px #fff; }
        
        /* 100%時のリッチな金文字エフェクト */
        .gold-text {
            background: linear-gradient(to bottom, #FFF3A1 0%, #F5C02B 50%, #B88500 100%);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0px 3px 5px rgba(0,0,0,0.4), 0px 0px 15px rgba(245, 192, 43, 0.8);
            font-size: 60px;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 歯柄のGAME OVERテキスト表現 */
        .gameover-text {
            font-size: 50px;
            font-weight: 900;
            background: url('tooth.png') repeat;
            background-size: 40px;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-stroke: 1.5px #333; /* 文字のフチドリ */
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .retry-btn { padding: 12px 24px; font-size: 18px; font-weight: bold; background-color: #ff4a4a; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #cc0000; transition: transform 0.1s, box-shadow 0.1s; }
        .retry-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="audioOverlay">
            <div>画面をタップして開始</div>
            <p>※BGMを再生するために必要です</p>
        </div>
        
        <div id="startScreen">
            <img id="startBtn" src="START.png" alt="START">
        </div>

        <img id="tooth" src="tooth.png" alt="歯">
        <img id="stopBtn" src="stop.png" alt="STOP">
        
        <div id="resultBoard">
            <div id="resultText"></div>
            <button class="retry-btn" onclick="location.reload()">もう一度プレイ</button>
        </div>
    </div>

    <script>
        const audioOverlay = document.getElementById('audioOverlay');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const tooth = document.getElementById('tooth');
        const stopBtn = document.getElementById('stopBtn');
        const resultBoard = document.getElementById('resultBoard');
        const resultText = document.getElementById('resultText');
        const gameArea = document.getElementById('gameArea');

        const bgm = new Audio('bgm.mp3');
        bgm.loop = true;
        const stopSe = new Audio('stop.mp3');

        // ==== BGMの自動再生処理 ====
        // ブラウザはユーザーの操作なしでの音楽再生をブロックするため、
        // 失敗した場合は黒い画面(audioOverlay)を出してタップさせます。
        let isMusicStarted = false;
        
        function tryAutoPlay() {
            bgm.play().then(() => {
                isMusicStarted = true;
                audioOverlay.style.display = 'none';
            }).catch(() => {
                // 自動再生がブロックされた場合
                audioOverlay.style.display = 'flex';
            });
        }
        
        // ページ読み込み完了時に自動再生にトライ
        window.addEventListener('load', tryAutoPlay);
        
        // タップされたら強制再生して進む
        audioOverlay.addEventListener('click', () => {
            bgm.play();
            isMusicStarted = true;
            audioOverlay.style.display = 'none';
        });


        // ==== ゲームの動きに関する変数 ====
        let pos = { x: 0, y: 0 };
        let vector = { x: 0, y: 0 };
        let speedMultiplier = 1;
        let isRotating = false;
        let rotationAngle = 0;
        let gameInterval;
        let isPlaying = false;
        
        // 正解の座標（中央 ＆ 高さ77%）
        let targetX = 0;
        let targetY = 0;

        // スタートボタン押下
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            startScreen.style.display = 'none';
            tooth.style.display = 'block';
            stopBtn.style.display = 'block';
            
            targetX = gameArea.clientWidth * 0.5;
            targetY = gameArea.clientHeight * 0.77;
            
            // 動きをランダムに決定
            setupRandomMovement();
            
            isPlaying = true;
            gameInterval = setInterval(moveTooth, 20);
        });

        // ランダムな動きを設定する関数
        function setupRandomMovement() {
            const w = gameArea.clientWidth;
            const h = gameArea.clientHeight;
            const margin = 100; // 画面外からスタートさせるための距離

            // 8方向のどこから出現するかランダム決定
            const pattern = Math.floor(Math.random() * 8);
            let startX, startY;
            
            switch(pattern) {
                case 0: startX = targetX; startY = -margin; break; // 上から
                case 1: startX = targetX; startY = h + margin; break; // 下から
                case 2: startX = -margin; startY = -margin; break; // 左斜め上
                case 3: startX = w + margin; startY = -margin; break; // 右斜め上
                case 4: startX = -margin; startY = h + margin; break; // 左斜め下
                case 5: startX = w + margin; startY = h + margin; break; // 右斜め下
                case 6: startX = -margin; startY = targetY; break; // 左真横
                case 7: startX = w + margin; startY = targetY; break; // 右真横
            }

            pos.x = startX;
            pos.y = startY;

            // ゴール(正解位置)に向かう直線を計算
            let dx = targetX - startX;
            let dy = targetY - startY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            let baseSpeed = 8; // 基本速度
            vector.x = (dx / distance) * baseSpeed;
            vector.y = (dy / distance) * baseSpeed;

            // スピードと回転のランダム決定
            const rand = Math.random(); 
            isRotating = false;
            
            if (rand < 0.60) {
                speedMultiplier = 1.0; // 60%: 普通
            } else if (rand < 0.80) {
                speedMultiplier = 1.6; // 20%: 少し早い
            } else if (rand < 0.95) {
                speedMultiplier = 1.0; // 15%: 普通＋回転
                isRotating = true;
            } else {
                speedMultiplier = 0.35; // 5%: すごくゆっくり(チャンス)
            }
        }

        // 歯を動かす関数
        function moveTooth() {
            if (!isPlaying) return;
            
            pos.x += vector.x * speedMultiplier;
            pos.y += vector.y * speedMultiplier;
            
            tooth.style.left = pos.x + 'px';
            tooth.style.top = pos.y + 'px';

            if (isRotating) {
                rotationAngle += 12 * speedMultiplier;
                tooth.style.transform = `rotate(${rotationAngle}deg)`;
            } else {
                tooth.style.transform = `rotate(0deg)`;
            }

            // 画面外に通り過ぎてしまったらGAME OVER
            const w = gameArea.clientWidth;
            const h = gameArea.clientHeight;
            if (pos.x < -150 || pos.x > w + 150 || pos.y < -150 || pos.y > h + 150) {
                gameOver();
            }
        }

        // ゲームオーバー処理
        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            bgm.pause();
            
            // tooth.pngを文字の模様（柄）として使ったGAME OVER表示
            resultText.innerHTML = `
                <div class="gameover-text">GAME<br>OVER</div>
                <div style="font-size:16px; color:#333; font-weight:bold;">通り過ぎてしまった…</div>
            `;
            resultBoard.style.display = "block";
        }

        // STOPボタン処理
        stopBtn.addEventListener('click', () => {
            if (!isPlaying) return;
            isPlaying = false;
            clearInterval(gameInterval);

            bgm.pause();
            stopSe.currentTime = 0;
            stopSe.play().catch(e => console.log(e));

            // 正解位置との距離を計算
            let dx = targetX - pos.x;
            let dy = targetY - pos.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            let score;

            // 距離が2ピクセル以内の場合のみ100% (超シビア)
            if (distance <= 2) {
                score = 100.0;
            } else {
                // 距離に応じて減点 (100%以下からスタート)
                score = Math.max(0, 100 - (distance * 0.45));
                if (score >= 100) score = 99.9; // 2px以上ズレていたら絶対100にならない
            }

            let displayScore = score.toFixed(1); // 小数点第1位まで表示
            let htmlStr = `<div class="result-title">１本の歯フィット感</div>`;

            if (displayScore === "100.0") {
                htmlStr += `<div class="gold-text">100.0%</div>`;
            } else {
                htmlStr += `<div class="score-text">${displayScore}%</div>`;
            }
            
            resultText.innerHTML = htmlStr;
            resultBoard.style.display = "block";
        });
    </script>
</body>
</html>
