<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>一本の歯フィット感</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #wrap {
      width: 100vw;
      height: 100dvh;
      display: grid;
      place-items: center;
      background: #000;
    }

    canvas {
      width: auto;
      height: 100dvh;
      max-width: 100vw;
      max-height: 100dvh;
      display: block;
      background: #111;
      box-shadow: 0 0 35px rgba(0,0,0,.75);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="945" height="2048" aria-label="一本の歯フィット感ゲーム"></canvas>
  </div>

  <!-- GitHubに置く時は index.html と同じ階層に下記ファイルを置く -->
  <audio id="bgm" src="bgm.mp3" loop preload="auto" autoplay></audio>
  <audio id="stopSE" src="stop.mp3" preload="auto"></audio>

  <script>
    (() => {
      "use strict";

      const W = 945;
      const H = 2048;
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const bgm = document.getElementById("bgm");
      const stopSE = document.getElementById("stopSE");
      bgm.volume = 0.6;
      stopSE.volume = 0.9;

      const img = {};
      const files = {
        title: "TITLE_LOGO.jpg",
        bg: "bg.jpg",
        answer: "bg正解.jpg",
        start: "START.png",
        stop: "stop.png",
        tooth: "tooth.png"
      };

      const state = {
        scene: "loading", // loading / title / playing / result / gameover
        tooth: null,
        score: 0,
        stopped: false,
        lastTime: 0,
        audioUnlocked: false,
        flash: 0
      };

      // bg正解.jpg上の「正解の歯」位置。必要ならここだけ微調整。
      const TARGET = {
        cx: 546,
        cy: 1385,
        w: 78,
        h: 56,
        angle: 0
      };

      const STOP_BUTTON = {
        cx: W / 2,
        cy: H - 190,
        w: 310,
        h: 310
      };

      const START_BUTTON = {
        cx: W / 2,
        cy: H * 0.76,
        w: 330,
        h: 330
      };

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
      const rand = (min, max) => min + Math.random() * (max - min);

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = src;
        });
      }

      async function loadAssets() {
        const entries = Object.entries(files);
        await Promise.all(entries.map(async ([key, src]) => img[key] = await loadImage(src)));
        state.scene = "title";
        draw();
        tryAutoPlay();
      }

      function tryAutoPlay() {
        // ブラウザによっては自動再生がブロックされるので、初回タップでも再トライする。
        const p = bgm.play();
        if (p && p.catch) p.catch(() => {});
      }

      function unlockAudio() {
        if (state.audioUnlocked) return;
        state.audioUnlocked = true;
        tryAutoPlay();
      }

      function weightedSpeedType() {
        const r = Math.random();
        if (r < 0.60) return "normal";       // 60%
        if (r < 0.80) return "fast";         // 20%
        if (r < 0.95) return "rotateNormal"; // 15%
        return "chance";                     // 5%
      }

      function newTooth() {
        const margin = 130;
        const dirs = [
          { name: "top",       x: rand(180, W - 180), y: -margin,        vx: rand(-20, 20),  vy: 1 },
          { name: "bottom",    x: rand(180, W - 180), y: H + margin,     vx: rand(-20, 20),  vy: -1 },
          { name: "leftTop",   x: -margin,            y: -margin,        vx: 0.72,           vy: 1 },
          { name: "rightTop",  x: W + margin,         y: -margin,        vx: -0.72,          vy: 1 },
          { name: "leftBottom",x: -margin,            y: H + margin,     vx: 0.72,           vy: -1 },
          { name: "rightBottom",x: W + margin,        y: H + margin,     vx: -0.72,          vy: -1 },
          { name: "left",      x: -margin,            y: rand(850,1500), vx: 1,              vy: rand(-0.08,0.08) },
          { name: "right",     x: W + margin,         y: rand(850,1500), vx: -1,             vy: rand(-0.08,0.08) }
        ];

        const d = dirs[Math.floor(Math.random() * dirs.length)];
        const type = weightedSpeedType();
        let speed = 430;
        let rotateSpeed = 0;

        if (type === "fast") speed = 620;
        if (type === "rotateNormal") {
          speed = 430;
          rotateSpeed = rand(-5.6, 5.6);
        }
        if (type === "chance") speed = 185;

        // 少しだけゲームごとにブレを足す
        speed *= rand(0.92, 1.08);

        const len = Math.hypot(d.vx, d.vy) || 1;
        return {
          x: d.x,
          y: d.y,
          vx: d.vx / len * speed,
          vy: d.vy / len * speed,
          angle: rand(-0.25, 0.25),
          rotateSpeed,
          w: TARGET.w,
          h: TARGET.h,
          type,
          dir: d.name
        };
      }

      function startGame() {
        state.tooth = newTooth();
        state.score = 0;
        state.stopped = false;
        state.flash = 0;
        state.scene = "playing";
        state.lastTime = performance.now();
        requestAnimationFrame(loop);
      }

      function stopGame() {
        if (state.scene !== "playing" || state.stopped) return;
        state.stopped = true;
        playStopSE();
        state.score = calcScore(state.tooth);
        state.flash = 1;
        state.scene = "result";
        draw();
      }

      function playStopSE() {
        try {
          stopSE.currentTime = 0;
          const p = stopSE.play();
          if (p && p.catch) p.catch(() => {});
        } catch (_) {}
      }

      function calcScore(t) {
        const dx = Math.abs(t.x - TARGET.cx);
        const dy = Math.abs(t.y - TARGET.cy);
        const posDist = Math.hypot(dx / 2.1, dy / 2.1);
        const angleDiff = Math.abs(Math.atan2(Math.sin(t.angle - TARGET.angle), Math.cos(t.angle - TARGET.angle)));
        const anglePenalty = angleDiff * 18;

        // かなりシビア。中心ズレ＋回転ズレで減点。
        const raw = 100 - posDist - anglePenalty;
        const score = clamp(raw, 0, 100);
        return Math.round(score * 10) / 10;
      }

      function isOut(t) {
        const pad = 85;
        return t.x < -pad || t.x > W + pad || t.y < -pad || t.y > H + pad;
      }

      function loop(now) {
        if (state.scene !== "playing") return;
        const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
        state.lastTime = now;

        const t = state.tooth;
        t.x += t.vx * dt;
        t.y += t.vy * dt;
        t.angle += t.rotateSpeed * dt;

        if (isOut(t)) {
          state.scene = "gameover";
          draw();
          return;
        }

        draw();
        requestAnimationFrame(loop);
      }

      function coverImage(image, x, y, w, h) {
        const s = Math.max(w / image.width, h / image.height);
        const dw = image.width * s;
        const dh = image.height * s;
        ctx.drawImage(image, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
      }

      function containImage(image, x, y, w, h) {
        const s = Math.min(w / image.width, h / image.height);
        const dw = image.width * s;
        const dh = image.height * s;
        ctx.drawImage(image, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        if (state.scene === "loading") {
          ctx.fillStyle = "#111";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#fff";
          ctx.font = "700 46px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("NOW LOADING...", W / 2, H / 2);
          return;
        }

        if (state.scene === "title") {
          drawTitle();
          return;
        }

        if (state.scene === "playing") {
          drawPlaying();
          return;
        }

        if (state.scene === "result") {
          drawResult();
          return;
        }

        if (state.scene === "gameover") {
          drawGameOver();
        }
      }

      function drawTitle() {
        coverImage(img.title, 0, 0, W, H); // ゲーム画角と同じ長さで表示
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,.35)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 10;
        containImage(img.start, START_BUTTON.cx - START_BUTTON.w / 2, START_BUTTON.cy - START_BUTTON.h / 2, START_BUTTON.w, START_BUTTON.h);
        ctx.restore();
      }

      function drawPlaying() {
        coverImage(img.bg, 0, 0, W, H);
        drawTooth(state.tooth);
        drawStopButton();
      }

      function drawResult() {
        coverImage(img.answer, 0, 0, W, H);

        // 正解写真を薄く見せつつ、止めた歯を前面に残す
        ctx.fillStyle = "rgba(255,255,255,.18)";
        ctx.fillRect(0, 0, W, H);
        drawTooth(state.tooth);

        const score = state.score;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // メガネの上あたり
        const panelY = 820;
        roundRect(W / 2 - 345, panelY - 135, 690, 250, 34, "rgba(255,255,255,.72)", "rgba(0,0,0,.12)");

        ctx.fillStyle = "#111";
        ctx.font = "900 58px sans-serif";
        ctx.fillText("１本の歯フィット感", W / 2, panelY - 54);

        if (score === 100) {
          const grad = ctx.createLinearGradient(0, panelY, 0, panelY + 110);
          grad.addColorStop(0, "#fff7b0");
          grad.addColorStop(.35, "#ffd54a");
          grad.addColorStop(.7, "#b97900");
          grad.addColorStop(1, "#fff1a1");
          ctx.fillStyle = grad;
          ctx.strokeStyle = "#6b3900";
          ctx.lineWidth = 9;
          ctx.font = "1000 110px Georgia, serif";
          ctx.strokeText("100%", W / 2, panelY + 48);
          ctx.fillText("100%", W / 2, panelY + 48);
        } else {
          ctx.fillStyle = "#e50012";
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 8;
          ctx.font = "1000 108px sans-serif";
          const text = score.toFixed(1) + "%";
          ctx.strokeText(text, W / 2, panelY + 50);
          ctx.fillText(text, W / 2, panelY + 50);
        }

        drawTapToRetry();
      }

      function drawGameOver() {
        coverImage(img.bg, 0, 0, W, H);
        ctx.fillStyle = "rgba(0,0,0,.43)";
        ctx.fillRect(0, 0, W, H);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "1000 128px Impact, sans-serif";
        ctx.lineWidth = 14;
        ctx.strokeStyle = "#111";
        ctx.fillStyle = "#fff0df";
        ctx.strokeText("GAME OVER", W / 2, 820);
        ctx.fillText("GAME OVER", W / 2, 820);

        // 歯を並べたGAME OVER装飾
        const text = "GAME OVER";
        let startX = 170;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (ch === " ") { startX += 70; continue; }
          drawSingleTooth(startX, 990 + Math.sin(i) * 18, 58, 62, (i - 4) * 0.08);
          startX += 72;
        }

        drawTapToRetry();
      }

      function drawStopButton() {
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,.35)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 8;
        containImage(img.stop, STOP_BUTTON.cx - STOP_BUTTON.w / 2, STOP_BUTTON.cy - STOP_BUTTON.h / 2, STOP_BUTTON.w, STOP_BUTTON.h);
        ctx.restore();
      }

      function drawTooth(t) {
        if (!t) return;
        drawSingleTooth(t.x, t.y, t.w, t.h, t.angle);
      }

      function drawSingleTooth(cx, cy, w, h, angle) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.drawImage(img.tooth, -w / 2, -h / 2, w, h);
        ctx.restore();
      }

      function drawTapToRetry() {
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "800 34px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,.95)";
        ctx.strokeStyle = "rgba(0,0,0,.55)";
        ctx.lineWidth = 7;
        ctx.strokeText("TAPでタイトルへ", W / 2, H - 88);
        ctx.fillText("TAPでタイトルへ", W / 2, H - 88);
      }

      function roundRect(x, y, w, h, r, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        if (fill) { ctx.fillStyle = fill; ctx.fill(); }
        if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 4; ctx.stroke(); }
      }

      function getCanvasPoint(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height)
        };
      }

      function hitButton(p, b) {
        return Math.abs(p.x - b.cx) <= b.w / 2 && Math.abs(p.y - b.cy) <= b.h / 2;
      }

      function handlePointer(e) {
        e.preventDefault();
        unlockAudio();
        const p = getCanvasPoint(e);

        if (state.scene === "title") {
          // START画像付近を押したら開始。画面のどこでも開始したい場合は次行だけ残す。
          if (hitButton(p, START_BUTTON) || p.y > H * 0.55) startGame();
          return;
        }

        if (state.scene === "playing") {
          if (hitButton(p, STOP_BUTTON)) stopGame();
          return;
        }

        if (state.scene === "result" || state.scene === "gameover") {
          state.scene = "title";
          draw();
        }
      }

      window.addEventListener("pointerdown", handlePointer, { passive: false });
      window.addEventListener("touchstart", handlePointer, { passive: false });
      window.addEventListener("keydown", (e) => {
        unlockAudio();
        if (e.code === "Space") {
          if (state.scene === "title") startGame();
          else if (state.scene === "playing") stopGame();
          else if (state.scene === "result" || state.scene === "gameover") { state.scene = "title"; draw(); }
        }
      });

      loadAssets().catch((err) => {
        console.error(err);
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.font = "700 34px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("画像・音声ファイルが読み込めません", W / 2, H / 2 - 20);
        ctx.fillText("index.htmlと同じ階層に素材を置いてください", W / 2, H / 2 + 38);
      });
    })();
  </script>
</body>
</html>
